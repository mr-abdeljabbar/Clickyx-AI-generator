# Clickyx AI Netlify Configuration
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  PRISMA_CLIENT_ENGINE_TYPE = "library"

[functions]
  directory = "netlify/functions"
  external_node_modules = ["lightningcss", "tailwindcss", "@tailwindcss/vite", "@tailwindcss/oxide"]
  node_bundler = "esbuild"
  included_files = ["node_modules/.prisma/client/*.node"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
